<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#f5f5f5"/>
  
  <!-- Main logo container -->
  <g>
    <!-- Orange AT initials with modern design -->
    <defs>
      <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#FF8833;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Main circle background -->
    <circle cx="100" cy="100" r="70" fill="url(#logoGradient)"/>
    
    <!-- Inner circle with text container -->
    <circle cx="100" cy="100" r="60" fill="white" opacity="0.15"/>
    
    <!-- T letter -->
    <text x="75" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">T</text>
    
    <!-- C letter (for Telecom) -->
    <text x="125" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">C</text>
    
    <!-- Accent lines for professionalism -->
    <line x1="65" y1="85" x2="135" y2="85" stroke="white" stroke-width="2" opacity="0.8"/>
    <line x1="70" y1="140" x2="130" y2="140" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>